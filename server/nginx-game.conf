server {
    listen 80;
    listen [::]:80;
    server_name game.unsnow.online;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name game.unsnow.online;

    ssl_certificate /etc/letsencrypt/live/game.unsnow.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.unsnow.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options "nosniff" always;

    location = / { return 301 /td/; }
    location = /td { return 301 /td/; }

    location ^~ /td/api/ {
        proxy_pass http://127.0.0.1:3947;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ^~ /td/auth/ {
        proxy_pass http://127.0.0.1:3947;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /td/ {
        root /var/www;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
